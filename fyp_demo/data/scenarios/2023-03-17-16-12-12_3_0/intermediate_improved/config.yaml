data_augment:
- ALONG_AXIS_LIST:
  - x
  NAME: random_world_flip
- NAME: random_world_rotation
  WORLD_ROT_ANGLE:
  - -0.78539816
  - 0.78539816
- NAME: random_world_scaling
  WORLD_SCALE_RANGE:
  - 0.95
  - 1.05
dataset_mode: vc
fusion:
  args: []
  core_method: IntermediateFusionDataset
loss:
  args:
    cls_weight: 1.0
    num_class: 3
    reg: 2.0
  core_method: point_pillar_loss
lr_scheduler:
  core_method: multistep
  gamma: 0.1
  step_size:
  - 60
  - 105
model:
  args:
    anchor_num: 2
    anchor_number: 2
    base_bev_backbone:
      layer_nums:
      - 3
      - 5
      - 8
      layer_strides:
      - 2
      - 2
      - 2
      num_filters:
      - 64
      - 128
      - 256
      num_upsample_filter:
      - 128
      - 128
      - 128
      upsample_strides:
      - 1
      - 2
      - 4
    compression: 0
    lidar_range: &id001
    - -102.4
    - -40
    - -15
    - 102.4
    - 40
    - 15
    num_class: 3
    pillar_vfe:
      num_filters:
      - 64
      use_absolute_xyz: true
      use_norm: true
      with_distance: false
    point_pillar_scatter:
      grid_size: !!python/object/apply:numpy.core.multiarray._reconstruct
        args:
        - !!python/name:numpy.ndarray ''
        - !!python/tuple
          - 0
        - !!binary |
          Yg==
        state: !!python/tuple
        - 1
        - !!python/tuple
          - 3
        - !!python/object/apply:numpy.dtype
          args:
          - i8
          - false
          - true
          state: !!python/tuple
          - 3
          - <
          - null
          - null
          - null
          - -1
          - -1
          - 0
        - false
        - !!binary |
          AAIAAAAAAADIAAAAAAAAAAEAAAAAAAAA
      num_features: 64
    shrink_header:
      dim:
      - 256
      input_dim: 384
      kernal_size:
      - 3
      padding:
      - 1
      stride:
      - 1
    voxel_size: &id003
    - 0.4
    - 0.4
    - 30
  core_method: point_pillar_intermediate
name: point_pillar_intermediate_fusion
optimizer:
  args:
    eps: 1.0e-10
    weight_decay: 0.0001
  core_method: Adam
  lr: 0.001
postprocess:
  anchor_args:
    D: 1
    H: 200
    W: 512
    anchor_generator_config: &id002
    - align_center: true
      anchor_bottom_heights:
      - -1.78
      anchor_rotations:
      - 0
      - 1.57
      anchor_sizes:
      - - 3.9
        - 1.6
        - 1.56
      class_name: vehicle
      feature_map_stride: 2
      matched_threshold: 0.6
      unmatched_threshold: 0.45
    - align_center: true
      anchor_bottom_heights:
      - -0.6
      anchor_rotations:
      - 0
      - 1.57
      anchor_sizes:
      - - 0.8
        - 0.6
        - 1.73
      class_name: pedestrian
      feature_map_stride: 2
      matched_threshold: 0.5
      unmatched_threshold: 0.35
    - align_center: true
      anchor_bottom_heights:
      - -1.78
      anchor_rotations:
      - 0
      - 1.57
      anchor_sizes:
      - - 8
        - 3
        - 3
      class_name: truck
      feature_map_stride: 2
      matched_threshold: 0.6
      unmatched_threshold: 0.45
    cav_lidar_range: *id001
    num: 2
    vd: 30
    vh: 0.4
    vw: 0.4
  core_method: VoxelPostprocessor
  max_num: 300
  nms_thresh: 0.15
  order: hwl
  target_args:
    score_threshold: 0.2
preprocess:
  anchor_generator_config: *id002
  args:
    max_points_per_voxel: 32
    max_voxel_test: 640000
    max_voxel_train: 64000
    voxel_size: *id003
  cav_lidar_range: *id001
  core_method: SpVoxelPreprocessor
  num_class: 3
root_dir: /home/student/V2X-Real/opv2v_data_dumping/train4(1)
train_params:
  batch_size: 2
  epoches: 150
  eval_freq: 1
  save_freq: 1
validate_dir: /home/student/Downloads/Camera_LiDAR_test/test
yaml_parser: load_point_pillar_params
